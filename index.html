<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCANA</title>  <!-- ★ 게임 타이틀 여기서 변경 -->
    <!-- favicon / 앱 아이콘
         public/assets/icons/ 아래에 아래 파일들을 배치하세요:
           favicon.ico            — favicon.io 에서 Arcana_Logo.png 업로드 시 자동 생성
           favicon.png            — 192×192 PNG (favicon.io 패키지에 포함)
           apple-touch-icon.png   — 180×180 (favicon.io 패키지에 포함)
         그 전까지는 PNG를 직접 favicon으로 사용합니다.
    -->
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/icons/site.webmanifest" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #07070a;
        overflow: hidden;
        font-family: 'Cinzel', 'Georgia', serif;
        color: #e8dfc8;
      }
      #canvas-root {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #ui-root {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none; /* 자식이 pointer-events: auto 를 선택적으로 활성화 */
      }
    </style>
    <!-- 구글 폰트 (Cinzel) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <canvas id="canvas-root"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
